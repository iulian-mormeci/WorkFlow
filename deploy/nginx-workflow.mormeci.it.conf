# Copy to: /etc/nginx/sites-available/workflow
# sudo ln -sf /etc/nginx/sites-available/workflow /etc/nginx/sites-enabled/workflow
# sudo nginx -t && sudo systemctl reload nginx
#
# Requires: this file is included from `http { ... }` (default Ubuntu nginx layout).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name workflow.mormeci.it;

    return 301 https://workflow.mormeci.it$request_uri;
}

server {
    listen 443 ssl;
    server_name workflow.mormeci.it;

    ssl_certificate /etc/letsencrypt/live/workflow.mormeci.it/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/workflow.mormeci.it/privkey.pem;

    # If certbot created these (common on Ubuntu), uncomment for stronger TLS defaults:
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
